<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Stories Card-Stack — Habuild Comms-in-App</title>
<!-- Habuild Stories Prototype — 5 comms patterns
     2026-05-29 (Fri)
     Demonstrates how the Stories surface adapts to 5 distinct communication intents:
     1. Enroll · Kids Camp (pre-camp announcement)
     2. Daily update · Surya Namaskar Day 3 (already enrolled)
     3. Enroll · Women's Health Workshop
     4. Recovery · Missed Session Recording
     5. Seasonal tool · Mother's Day Card -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --primary-600: #0284C7;
    --primary-key: #0369A1;
    --primary-800: #075985;

    --on-1: #0F172A;
    --on-2: #334155;
    --on-3: #475569;
    --n-500: #64748B;
    --n-400: #94A3B8;
    --n-300: #CBD5E1;
    --n-200: #E2E8F0;
    --n-100: #F1F5F9;

    --white: #FFFFFF;
    --muted: #F1F5F9;
    --outline: #E2E8F0;

    --error: #DC2625;
    --success: #16A34A;

    --kids-accent: #C9924A;
    --surya-accent: #B68A3C;
    --women-accent: #B57894;
    --missed-accent: #6B7C8E;
    --mom-accent: #A88641;

    --font: "Poppins", system-ui, sans-serif;

    --ease-std: cubic-bezier(0.4, 0, 0.2, 1);
    --ease-spring: cubic-bezier(0.4, 1.4, 0.4, 1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    background: #1a1a1d;
    font-family: var(--font);
    color: var(--on-1);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 16px;
    overflow-x: hidden;
  }

  .reset-btn {
    position: fixed;
    top: 18px;
    right: 18px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.18);
    color: #E2E8F0;
    font-family: var(--font);
    font-weight: 500;
    font-size: 11px;
    padding: 8px 14px;
    border-radius: 999px;
    cursor: pointer;
    letter-spacing: 0.4px;
    transition: background .15s;
    z-index: 1000;
  }
  .reset-btn:hover { background: rgba(255,255,255,0.16); }

  .phone {
    width: 375px;
    height: 812px;
    background: var(--white);
    border-radius: 40px;
    border: 8px solid #0F172A;
    box-shadow: 0 30px 80px rgba(0,0,0,.45);
    position: relative;
    overflow: hidden;
  }

  .phone-inner {
    position: absolute;
    inset: 0;
    overflow-y: auto;
    overflow-x: hidden;
    padding-bottom: 88px;
    background: var(--white);
    scroll-behavior: smooth;
  }
  .phone-inner::-webkit-scrollbar { display: none; }

  /* Status bar inside the sage hero */
  .hero-status-bar {
    position: relative;
    z-index: 2;
    height: 34px;
    padding: 0 22px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 14px;
    font-weight: 600;
    color: #1F2A1D;
  }
  .hero-status-bar .right { display: flex; align-items: center; gap: 4px; }
  .hero-status-bar .dot { width: 4px; height: 4px; border-radius: 50%; background: currentColor; opacity: 0.75; }
  .hero-status-bar .battery {
    width: 22px; height: 11px;
    border: 1px solid currentColor; border-radius: 3px;
    position: relative; opacity: 0.85; margin-left: 4px;
  }
  .hero-status-bar .battery::after { content: ""; position: absolute; right: -3px; top: 3px; width: 2px; height: 5px; background: currentColor; border-radius: 0 1px 1px 0; }
  .hero-status-bar .battery::before { content: ""; position: absolute; left: 1px; top: 1px; bottom: 1px; width: 70%; background: currentColor; border-radius: 1px; }

  /* Hero — Sage & Stone (Calm / Aesop / spa-inspired) */
  .hero-section {
    position: relative;
    margin: 0 0 20px;
    background: linear-gradient(163deg, #EDF1EA 0%, #DDE5DB 55%, #CFD9CC 100%);
    border-radius: 0 0 32px 32px;
    border: none;
    border-bottom: 1px solid rgba(15, 23, 42, 0.06);
    box-shadow: 0 4px 12px rgba(31, 42, 29, 0.06);
    overflow: hidden;
  }
  .hero-section::before {
    content: "";
    position: absolute;
    top: -100px;
    right: -60px;
    width: 220px;
    height: 220px;
    border-radius: 50%;
    background: radial-gradient(closest-side, rgba(255, 248, 232, 0.55), transparent 72%);
    pointer-events: none;
  }
  .hero-section::after {
    content: "";
    position: absolute;
    inset: 0;
    background:
      radial-gradient(1.5px 1.5px at 18% 70%, rgba(15,23,42,0.08), transparent 60%),
      radial-gradient(1.5px 1.5px at 82% 30%, rgba(15,23,42,0.06), transparent 60%);
    pointer-events: none;
  }

  .greeting-row {
    position: relative;
    padding: 12px 24px 10px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    z-index: 1;
  }
  .greeting-text { display: flex; flex-direction: column; gap: 2px; }
  .greeting-hello { font-size: 22px; font-weight: 600; color: #2D3A2B; line-height: 1.15; letter-spacing: -0.3px; }
  .greeting-name { font-size: 13px; font-weight: 500; color: rgba(45, 58, 43, 0.65); line-height: 1.3; margin-top: 3px; letter-spacing: 0.1px; }
  .yoga-days { text-align: right; display: flex; flex-direction: column; align-items: flex-end; }
  .yoga-days .count { font-size: 44px; font-weight: 600; color: #1F2A1D; line-height: 0.92; letter-spacing: -1.6px; font-variant-numeric: tabular-nums; }
  .yoga-days .accent-bar { width: 20px; height: 1px; background: rgba(31, 42, 29, 0.32); margin: 9px 0 6px auto; }
  .yoga-days .label { font-size: 9.5px; font-weight: 600; color: rgba(31, 42, 29, 0.55); letter-spacing: 2px; text-transform: uppercase; }
  .yoga-days .accent-bar { width: 22px; height: 1.5px; background: #CBD5E1; margin: 8px 0 6px; margin-left: auto; border-radius: 1px; }
  .yoga-days .label { font-size: 10px; font-weight: 700; color: #64748B; letter-spacing: 1.6px; text-transform: uppercase; }

  .stories-row {
    display: flex;
    gap: 14px;
    padding: 4px 20px 16px;
    overflow-x: auto;
    overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
  }
  .stories-row::-webkit-scrollbar { display: none; }
  .story-item { flex-shrink: 0; width: 80px; display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; }
  .story-ring {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform .2s var(--ease-spring);
    position: relative;
  }
  .story-item:active .story-ring { transform: scale(0.94); }

  /* Segmented ring SVG sits on top of the ring */
  .ring-svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    transform: rotate(-90deg);
    pointer-events: none;
  }
  .ring-svg circle {
    fill: none;
    stroke-width: 2.5;
    stroke-linecap: round;
    transition: stroke 200ms ease;
  }
  /* Accent stroke colors per story type */
  .story-ring.kids-ring   .ring-svg circle { stroke: #B07C2D; }
  .story-ring.surya-ring  .ring-svg circle { stroke: #8B5E2F; }
  .story-ring.women-ring  .ring-svg circle { stroke: #8C5570; }
  .story-ring.missed-ring .ring-svg circle { stroke: #475569; }
  .story-ring.mom-ring    .ring-svg circle { stroke: #8C6628; }
  .story-ring.viewed      .ring-svg circle { stroke: #CBD5E1; }

  .story-ring.viewed .story-thumb {
    opacity: 0.6;
    filter: saturate(0.4);
  }
  .story-ring.viewed + .story-label {
    color: #94A3B8;
    font-weight: 500;
  }

  .story-avatar {
    position: absolute;
    inset: 5px;
    border-radius: 50%;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--white);
  }
  .story-thumb {
    width: 100%; height: 100%;
    border-radius: 50%;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .story-thumb svg { width: 60%; height: 60%; display: block; }
  .story-thumb.kids-thumb { background: linear-gradient(160deg, #FCE9CC, #E9C290); }
  .story-thumb.surya-thumb { background: linear-gradient(160deg, #FBEFCB, #E5C97B); }
  .story-thumb.women-thumb { background: linear-gradient(160deg, #F6E0E5, #DDB7C2); }
  .story-thumb.missed-thumb { background: linear-gradient(160deg, #E1E7EE, #B6C0CD); }
  .story-thumb.mom-thumb { background: linear-gradient(160deg, #F4E7C2, #D7B873); }

  .story-label {
    font-size: 11.5px;
    font-weight: 600;
    color: #0F172A;
    text-align: center;
    max-width: 80px;
    line-height: 1.25;
    word-break: keep-all;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .streak-card {
    position: relative;
    margin: 0;
    padding: 6px 22px 14px;
    z-index: 1;
  }
  .streak-card::before {
    content: "";
    position: absolute;
    top: 0;
    left: 22px;
    right: 22px;
    height: 1px;
    background: linear-gradient(to right, transparent, #E2E8F0, transparent);
  }
  .streak-bars { display: flex; justify-content: space-between; align-items: center; gap: 4px; padding-top: 8px; }
  .streak-bar-col { display: flex; flex-direction: column; align-items: center; gap: 6px; flex: 1; position: relative; }
  .streak-bar-col.is-today::before {
    content: "";
    position: absolute;
    top: -2px;
    left: 50%;
    transform: translateX(-50%);
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: radial-gradient(closest-side, rgba(2,132,199,0.18), transparent 70%);
    animation: streakTodayRipple 2.4s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes streakTodayRipple {
    0%, 100% { transform: translateX(-50%) scale(0.85); opacity: 0.7; }
    50%      { transform: translateX(-50%) scale(1.1);  opacity: 1; }
  }
  .streak-heart { width: 28px; height: 26px; display: flex; align-items: center; justify-content: center; position: relative; z-index: 1; }
  .streak-bar-col.is-today .streak-heart { width: 34px; height: 32px; }
  .streak-heart svg { width: 100%; height: 100%; overflow: visible; }
  .streak-heart svg path { fill: rgba(255, 255, 255, 0.6); stroke: #C9DAEC; stroke-width: 1.5; }
  .streak-heart.done svg path { fill: url(#streakHeartGrad); stroke: #0369A1; stroke-width: 1; filter: drop-shadow(0 2px 3px rgba(3,105,161,0.32)); }
  .streak-heart.today svg path { fill: rgba(2,132,199,0.08); stroke: #0284C7; stroke-width: 2; stroke-dasharray: 3.5 2.5; }
  .streak-heart.today { animation: streakTodayPulse 1.8s ease-in-out infinite; transform-origin: center; }
  @keyframes streakTodayPulse { 0%,100% { transform: scale(1);} 50% { transform: scale(1.1);} }
  .streak-bar-label { font-size: 10px; font-weight: 600; color: var(--n-500); letter-spacing: 0.3px; text-transform: uppercase; }
  .streak-bar-col.is-today .streak-bar-label { color: var(--primary-key); }

  .section-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--on-3);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 0 20px;
    margin-bottom: 10px;
  }

  .live-banner {
    margin: 0 20px 20px;
    width: 335px;
    border-radius: 16px;
    overflow: hidden;
    cursor: pointer;
    box-shadow: 0 8px 20px rgba(15, 23, 42, 0.08);
    display: block;
    line-height: 0;
  }
  .live-banner-img { width: 100%; height: auto; display: block; }

  .upcoming-list { padding: 0 20px 20px; display: flex; flex-direction: column; gap: 12px; }
  .upcoming-item {
    background: white;
    border: 1px solid var(--outline);
    border-radius: 16px;
    padding: 14px 0 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: transform .15s var(--ease-std);
    animation: slideIn .4s var(--ease-spring);
    overflow: hidden;
    box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
  }
  @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  .upcoming-item:active { transform: scale(0.98); }
  .upcoming-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 4px; padding-right: 8px; }
  .upcoming-time { font-size: 13px; font-weight: 500; color: var(--on-3); display: flex; align-items: center; gap: 6px; }
  .upcoming-time .dot { width: 3px; height: 3px; background: var(--n-500); border-radius: 50%; display: inline-block; }
  .upcoming-title { font-size: 17px; font-weight: 700; color: var(--on-1); line-height: 1.25; letter-spacing: -0.2px; }
  .upcoming-sub { font-size: 13px; font-weight: 500; color: var(--on-3); line-height: 1.3; }
  .upcoming-image {
    width: 110px;
    height: 92px;
    flex-shrink: 0;
    background: linear-gradient(163deg, #DCEDFF 0%, #BFD9FF 100%);
    position: relative;
    overflow: hidden;
    align-self: stretch;
    margin: -14px 0 -14px 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .upcoming-image svg { width: 56%; height: 56%; }
  .upcoming-image.kids { background: linear-gradient(163deg, #FCE9CC 0%, #E9C290 100%); }
  .upcoming-image.surya { background: linear-gradient(163deg, #FBEFCB 0%, #E5C97B 100%); }
  .upcoming-image.women { background: linear-gradient(163deg, #F6E0E5 0%, #DDB7C2 100%); }
  .upcoming-image.box { background: linear-gradient(163deg, #DCEDFF 0%, #93C5FD 100%); }
  .upcoming-image.daily { background: linear-gradient(163deg, #DCEDFF 0%, #BFD9FF 100%); }
  .upcoming-image.missed { background: linear-gradient(163deg, #E2E8F0 0%, #94A3B8 100%); }
  .upc-expires-chip {
    position: absolute;
    top: 8px;
    left: 8px;
    background: rgba(15, 23, 42, 0.78);
    color: white;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.3px;
    padding: 3px 7px;
    border-radius: 4px;
    backdrop-filter: blur(4px);
  }

  .bottom-nav {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 72px;
    background: var(--white);
    border-top: 1px solid var(--outline);
    display: flex;
    align-items: center;
    justify-content: space-around;
    padding: 0 8px 8px;
    z-index: 20;
  }
  .nav-tab {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    cursor: pointer; flex: 1; padding: 8px 4px; color: var(--n-500);
  }
  .nav-tab.active { color: var(--primary-key); }
  .nav-tab svg { stroke: currentColor; stroke-width: 2; fill: none; }
  .nav-tab span { font-size: 10px; font-weight: 500; }

  .cardstack-overlay {
    position: absolute;
    inset: 0;
    background: rgba(15, 23, 42, 0.6);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    z-index: 100;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding-top: 36px;
    padding-bottom: 24px;
    opacity: 0;
    transition: opacity .25s var(--ease-std);
  }
  .cardstack-overlay.active { display: flex; opacity: 1; }

  .cardstack-close {
    position: absolute;
    top: 14px; right: 14px;
    width: 36px; height: 36px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.2);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: white;
    z-index: 110;
  }
  .cardstack-close:hover { background: rgba(255,255,255,0.25); }
  .cardstack-close svg { stroke: white; stroke-width: 2.5; fill: none; }

  .cardstack-header {
    position: absolute;
    top: 22px; left: 18px;
    color: white;
    display: flex;
    align-items: center;
    gap: 10px;
    z-index: 105;
  }
  .cardstack-author-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.4);
    display: flex; align-items: center; justify-content: center;
    color: white; font-weight: 700; font-size: 12px;
    background: linear-gradient(135deg, #0ea5e9, #6366f1);
  }
  .cardstack-author-name { font-size: 12px; font-weight: 600; line-height: 1.1; }
  .cardstack-author-time { font-size: 10px; opacity: 0.75; line-height: 1.1; }

  .stack-container {
    width: 340px;
    height: 580px;
    position: relative;
    margin-top: 36px;
  }

  .stack-card {
    position: absolute;
    inset: 0;
    background: white;
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 20px 50px rgba(0,0,0,0.35), 0 2px 6px rgba(0,0,0,0.15);
    display: flex;
    flex-direction: column;
    transition: transform .35s var(--ease-spring), opacity .35s var(--ease-std);
    will-change: transform, opacity;
    cursor: grab;
    user-select: none;
    -webkit-user-select: none;
  }
  .stack-card.dragging { transition: none; cursor: grabbing; }

  .stack-card[data-pos="current"] { transform: translateX(0) translateY(0) scale(1) rotate(0deg); opacity: 1; z-index: 5; }
  .stack-card[data-pos="next"]    { transform: translateY(12px) scale(0.95); opacity: 0.7; z-index: 4; pointer-events: none; }
  .stack-card[data-pos="next2"]   { transform: translateY(22px) scale(0.9); opacity: 0.4; z-index: 3; pointer-events: none; }
  .stack-card[data-pos="hidden"]  { transform: translateY(32px) scale(0.85); opacity: 0; z-index: 2; pointer-events: none; }
  .stack-card[data-pos="gone"]    { transform: translateX(-120%) rotate(-12deg); opacity: 0; z-index: 1; pointer-events: none; }

  .card-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 0;
  }
  .card-body::-webkit-scrollbar { display: none; }
  .card-pad { padding: 20px 22px; }

  .card-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--kids-accent);
    color: white;
    padding: 5px 11px;
    border-radius: 999px;
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: 0.8px;
    align-self: flex-start;
    text-transform: uppercase;
  }
  .card-pill.kids { background: var(--kids-accent); }
  .card-pill.surya { background: var(--surya-accent); }
  .card-pill.women { background: var(--women-accent); }
  .card-pill.missed { background: var(--missed-accent); }
  .card-pill.mom { background: var(--mom-accent); }

  .card-title {
    font-size: 21px;
    font-weight: 700;
    color: var(--on-1);
    line-height: 1.18;
    margin-top: 8px;
    letter-spacing: -0.3px;
  }
  .card-sub {
    font-size: 13.5px;
    font-weight: 500;
    color: var(--on-3);
    line-height: 1.45;
    margin-top: 4px;
  }
  .card-when-line {
    font-size: 13px;
    font-weight: 600;
    color: var(--on-2);
    margin-top: 10px;
    padding: 8px 12px;
    background: var(--n-100);
    border-radius: 8px;
    display: inline-block;
    align-self: flex-start;
  }

  .card-cta-row {
    padding: 14px 22px 22px;
    background: white;
    border-top: 1px solid var(--n-200);
  }
  .card-cta-btn {
    width: 100%;
    height: 48px;
    background: var(--primary-key);
    color: white;
    border: none;
    border-radius: 999px;
    font-family: var(--font);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    box-shadow: 0 6px 14px rgba(3, 105, 161, 0.3);
    transition: transform .15s;
  }
  .card-cta-btn:active { transform: scale(0.97); }
  .card-cta-btn.kids { background: var(--kids-accent); box-shadow: 0 6px 14px rgba(201, 146, 74, 0.35); }
  .card-cta-btn.surya { background: var(--surya-accent); box-shadow: 0 6px 14px rgba(182, 138, 60, 0.35); }
  .card-cta-btn.women { background: var(--women-accent); box-shadow: 0 6px 14px rgba(181, 120, 148, 0.35); }
  .card-cta-btn.missed { background: var(--primary-key); }
  .card-cta-btn.mom { background: var(--mom-accent); box-shadow: 0 6px 14px rgba(168, 134, 65, 0.35); }
  .card-cta-secondary {
    text-align: center;
    margin-top: 10px;
    font-size: 12.5px;
    color: var(--on-3);
    font-weight: 500;
    cursor: pointer;
    padding: 4px;
  }
  .card-cta-secondary:hover { color: var(--primary-key); }

  .card-hero-svg {
    width: 100%;
    height: 220px;
    display: block;
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
  }
  .card-hero-svg svg { width: 100%; height: 100%; display: block; }

const STORY_ORDER = ['kids', 'surya', 'women', 'missed', 'mom'];

function renderStories() {
  const row = document.getElementById('storiesRow');
  // Sort: unviewed first (preserving STORY_ORDER), then viewed at the end
  const unviewed = STORY_ORDER.filter(key => !state.viewed[key]);
  const viewed   = STORY_ORDER.filter(key =>  state.viewed[key]);
  const ordered  = [...unviewed, ...viewed];
  row.innerHTML = ordered.map(key => {
    const s = STORIES[key];
    const isViewed = state.viewed[key];
    const ringClass = isViewed ? 'viewed' : `${key}-ring`;
    // Segmented ring: one arc per card. Single-card stories get a solid ring.
    const r = 28;
    const circumference = 2 * Math.PI * r;
    const n = Math.max(1, s.cards.length);
    let dashAttr = '';
    if (n > 1) {
      const gap = 6;
      const segLen = (circumference - gap * n) / n;
      dashAttr = `stroke-dasharray="${segLen.toFixed(2)} ${gap}"`;
    }
    return `
      <div class="story-item" onclick="openStack('${key}')">
        <div class="story-ring ${ringClass}">
          <svg class="ring-svg" viewBox="0 0 60 60">
            <circle cx="30" cy="30" r="${r}" ${dashAttr} />
          </svg>
          <div class="story-avatar">
            <div class="story-thumb ${s.thumbClass}">${s.thumbSvg}</div>
          </div>
        </div>
        <div class="story-label">${s.label}</div>
      </div>
    `;
  }).join('');
}

let currentStoryKey = null;
let currentCardIdx = 0;
let totalCards = 0;
let currentCards = [];

function openStack(key) {
  const s = STORIES[key];
  if (!s) return;
  currentStoryKey = key;

  currentCards = s.cards.filter(c => {
    if (c.showOnlyIfEnrolled && !state.enrolled[s.enrollKey]) return false;
    return true;
  });
  currentCardIdx = 0;
  totalCards = currentCards.length;

  state.viewed[key] = true;
  saveState();

  const avatarEl = document.getElementById('cardstackAvatar');
  avatarEl.textContent = s.authorAvatar;
  avatarEl.style.background = s.avatarGrad;
  document.getElementById('cardstackAuthor').textContent = s.authorName;
  document.getElementById('cardstackTime').textContent = s.authorTime;

  renderStackCards();
  document.getElementById('cardstackOverlay').classList.add('active');
  renderStories();
}

function closeStack() {
  document.getElementById('cardstackOverlay').classList.remove('active');
  currentStoryKey = null;
  currentCardIdx = 0;
}

function renderStackCards() {
  const container = document.getElementById('stackContainer');
  container.innerHTML = currentCards.map((c, i) => renderCardHTML(c, i)).join('');
  updateStackPositions();
  renderDots();
  attachSwipe();
}

function renderCardHTML(card, idx) {
  const heroHTML = card.hero ? `<div class="card-hero-svg ${card.kenburns ? 'ken-burns' : ''}">${card.hero}</div>` : '';
  const pillHTML = card.pillText ? `<div class="card-pill ${card.pillClass || ''}">${card.pillText}</div>` : '';
  const titleHTML = card.title ? `<div class="card-title">${card.title}</div>` : '';
  const subHTML = card.sub ? `<div class="card-sub">${card.sub}</div>` : '';
  const whenLineHTML = card.whenLine ? `<div class="card-when-line">${card.whenLine}</div>` : '';
  const nextHintHTML = card.nextHint ? `
    <div class="card-next-hint" onclick="advance(1)">
      <span>${card.nextHint}</span>
      <svg width="14" height="14" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><polyline points="9,6 15,12 9,18"/></svg>
    </div>
  ` : '';

  let bodyHTML = '';

  if (card.dayList) {
    const iconClass = card.pillClass;
    // Detect compact format (10-day arc with day + topic + expert)
    const isCompact = card.dayList[0] && card.dayList[0].expert !== undefined;
    bodyHTML += `<div class="day-list ${isCompact ? 'compact' : ''}">`;
    card.dayList.forEach(d => {
      if (isCompact) {
        bodyHTML += `
          <div class="day-list-row-compact">
            <div class="dlc-day ${iconClass}">${d.day}</div>
            <div class="dlc-topic">${d.topic}</div>
            <div class="dlc-expert">${d.expert}</div>
          </div>
        `;
      } else {
        bodyHTML += `
          <div class="day-list-row">
            <div class="day-list-icon ${iconClass}">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="stroke: var(--${iconClass}-accent);"><circle cx="12" cy="12" r="3"/><path d="M12 4v3 M12 17v3 M4 12h3 M17 12h3 M6 6l2 2 M16 16l2 2 M6 18l2-2 M16 8l2-2"/></svg>
            </div>
            <div class="day-list-text">
              <div class="day-list-day">${d.day}</div>
              <div class="day-list-topic">${d.topic}</div>
            </div>
          </div>
        `;
      }
    });
    if (card.dayListMore) {
      bodyHTML += `<div class="day-list-more">${card.dayListMore}</div>`;
    }
    bodyHTML += `</div>`;
  }

  if (card.experts) {
    bodyHTML += `<div class="experts-row">
      <div class="experts-row-label">${card.expertsLabel || 'Experts'}</div>
      <div class="experts-avatars">
        ${card.experts.map(e => `<div class="expert-avatar ${e.cls}">${e.initials}</div>`).join('')}
      </div>
      ${card.expertsNames ? `<div class="experts-names">${card.expertsNames}</div>` : ''}
    </div>`;
  }

  if (card.timeline) {
    bodyHTML += `<div class="surya-timeline">`;
    card.timeline.forEach((row, ri) => {
      bodyHTML += `
        <div class="surya-tl-row">
          <div class="surya-tl-dot ${row.focus ? 'focus' : ''}">${ri + 1}</div>
          <div class="surya-tl-content">
            <div class="surya-tl-step">${row.step}${row.focus ? '<span class="focus-tag">Today</span>' : ''}</div>
            <div class="surya-tl-meta">${row.meta}</div>
          </div>
        </div>
      `;
    });
    bodyHTML += `</div>`;
  }

  if (card.glyphs) {
    bodyHTML += `<div class="surya-glyphs">
      <div class="surya-glyphs-label">${card.glyphsLabel || '12-STEP REFERENCE'}</div>
      <div class="surya-glyphs-row">
        ${card.glyphs.map(g => `<div class="surya-glyph ${g.focus ? 'focus' : ''}">${g.svg}</div>`).join('')}
      </div>
    </div>`;
  }

  if (card.progress) {
    bodyHTML += `<div class="surya-progress">
      <div class="surya-progress-label">Your 5-day arc</div>
      <div class="surya-progress-track">
        ${card.progress.map(p => {
          let inner = p.label;
          if (p.state === 'done') inner = '<svg width="11" height="11" viewBox="0 0 14 14"><polyline points="2,7 6,11 12,3" stroke-linejoin="round" stroke-linecap="round"/></svg>';
          return `
            <div class="surya-pnode ${p.state === 'today' ? 'today-node' : ''}">
              <div class="surya-pnode-circle ${p.state}">${inner}</div>
              <div class="surya-pnode-label">${p.label}</div>
            </div>
          `;
        }).join('')}
      </div>
    </div>`;
  }

  if (card.whoList) {
    bodyHTML += `<div class="who-list">
      ${card.whoList.map(item => `
        <div class="who-row">
          <div class="who-row-dot"></div>
          <div class="who-row-text">${item}</div>
        </div>
      `).join('')}
    </div>`;
  }

  if (card.steps) {
    bodyHTML += `<div class="steps-list">
      ${card.steps.map(st => `
        <div class="step-row">
          <div class="step-num">${st.num}</div>
          <div class="step-text">${st.text}</div>
        </div>
      `).join('')}
    </div>`;
  }

  if (card.recoveryBlock) {
    bodyHTML += `<div class="recovery-block">
      <div class="recovery-block-title">${card.recoveryBlock.title}</div>
      <div class="recovery-block-sub">${card.recoveryBlock.sub}</div>
    </div>`;
  }

  if (card.detailFacts) {
    bodyHTML += `<div class="detail-facts">
      ${card.detailFacts.map(f => `
        <div class="detail-fact-row">
          <div class="detail-fact-label">${f.label}</div>
          <div class="detail-fact-value">${f.value}</div>
        </div>
      `).join('')}
    </div>`;
  }

  if (card.reassurance) {
    bodyHTML += `<div class="reassurance">
      <svg width="14" height="14" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 8v4"/><circle cx="12" cy="16" r="0.6" fill="currentColor"/></svg>
      <div>${card.reassurance}</div>
    </div>`;
  }

  let ctaHTML = '';
  if (card.cta) {
    ctaHTML = `
      <div class="card-cta-row">
        <button class="card-cta-btn ${card.ctaClass || ''}" onclick="handleCardCta(${idx})">${card.cta}</button>

            <span>${card.nextHint}</span>
            <svg width="14" height="14" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><polyline points="9,6 15,12 9,18"/></svg>
          </div>
        ` : ''}
        ${card.secondaryCta ? `<div class="card-cta-secondary" onclick="handleSecondaryCta()">${card.secondaryCta}</div>` : ''}
      </div>
    `;
  }

  return `
    <div class="stack-card" data-idx="${idx}">
      <div class="card-body">
        ${heroHTML}
        <div class="card-pad">
          ${pillHTML}
          ${titleHTML}
          ${subHTML}
          ${whenLineHTML}
          ${bodyHTML}
        </div>
      </div>
      ${ctaHTML}
      <div class="swipe-badge prev">BACK</div>
      <div class="swipe-badge next">NEXT</div>
    </div>
  `;
}

function updateStackPositions() {
  const cards = document.querySelectorAll('.stack-card');
  cards.forEach((c, i) => {
    const rel = i - currentCardIdx;
    let pos;
    if (rel < 0) pos = 'gone';
    else if (rel === 0) pos = 'current';
    else if (rel === 1) pos = 'next';
    else if (rel === 2) pos = 'next2';
    else pos = 'hidden';
    c.setAttribute('data-pos', pos);
    c.style.transform = '';
    c.style.opacity = '';
  });
  document.getElementById('stackPrev').classList.toggle('disabled', currentCardIdx === 0);
  document.getElementById('stackNext').classList.toggle('disabled', currentCardIdx === totalCards - 1);
  renderDots();
}

function renderDots() {
  const dotsEl = document.getElementById('stackDots');
  if (!dotsEl) return;
  dotsEl.innerHTML = '';
  for (let i = 0; i < totalCards; i++) {
    const d = document.createElement('div');
    d.className = 'stack-dot' + (i === currentCardIdx ? ' active' : (i < currentCardIdx ? ' passed' : ''));
    dotsEl.appendChild(d);
  }
}

function advance(dir) {
  const newIdx = currentCardIdx + dir;
  if (newIdx < 0 || newIdx >= totalCards) return;
  currentCardIdx = newIdx;
  updateStackPositions();
}

function attachSwipe() {
  const cards = document.querySelectorAll('.stack-card');
  cards.forEach(card => {
    let startX = 0, startY = 0, currentX = 0, dragging = false;
    let startTime = 0;

    const onStart = (e) => {
      if (card.getAttribute('data-pos') !== 'current') return;
      if (e.target.closest('button, .card-cta-secondary, .step-row, .day-list-row, .who-row, .surya-tl-row, .surya-pnode')) return;
      const pt = e.touches ? e.touches[0] : e;
      startX = pt.clientX;
      startY = pt.clientY;
      startTime = Date.now();
      dragging = true;
      card.classList.add('dragging');
    };

    const onMove = (e) => {
      if (!dragging) return;
      const pt = e.touches ? e.touches[0] : e;
      const dx = pt.clientX - startX;
      const dy = pt.clientY - startY;
      if (Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > 14) {
        dragging = false;
        card.classList.remove('dragging');
        card.style.transform = '';
        const nb = card.querySelector('.swipe-badge.next');
        const pb = card.querySelector('.swipe-badge.prev');
        if (nb) nb.style.opacity = '0';
        if (pb) pb.style.opacity = '0';
        return;
      }
      currentX = dx;
      const rot = dx / 22;
      card.style.transform = `translateX(${dx}px) rotate(${rot}deg)`;
      const nextBadge = card.querySelector('.swipe-badge.next');
      const prevBadge = card.querySelector('.swipe-badge.prev');
      if (dx < -40) {
        nextBadge.style.opacity = Math.min(1, Math.abs(dx) / 100);
        prevBadge.style.opacity = '0';
      } else if (dx > 40) {
        prevBadge.style.opacity = Math.min(1, Math.abs(dx) / 100);
        nextBadge.style.opacity = '0';
      } else {
        nextBadge.style.opacity = '0';
        prevBadge.style.opacity = '0';
      }
      if (e.cancelable) e.preventDefault();
    };

    const onEnd = (e) => {
      if (!dragging) return;
      dragging = false;
      card.classList.remove('dragging');
      const dx = currentX;
      const dt = Date.now() - startTime;
      const velocity = Math.abs(dx) / dt;
      const nextBadge = card.querySelector('.swipe-badge.next');
      const prevBadge = card.querySelector('.swipe-badge.prev');
      if (nextBadge) nextBadge.style.opacity = '0';
      if (prevBadge) prevBadge.style.opacity = '0';

      if ((dx < -100 || (dx < -50 && velocity > 0.5)) && currentCardIdx < totalCards - 1) {
        card.style.transform = `translateX(-120%) rotate(-12deg)`;
        card.style.opacity = '0';
        setTimeout(() => {
          card.style.transform = '';
          card.style.opacity = '';
          advance(1);
        }, 250);
      } else if ((dx > 100 || (dx > 50 && velocity > 0.5)) && currentCardIdx > 0) {
        card.style.transform = `translateX(120%) rotate(12deg)`;
        card.style.opacity = '0';
        setTimeout(() => {
          card.style.transform = '';
          card.style.opacity = '';
          advance(-1);
        }, 250);
      } else {
        card.style.transform = '';
      }
      currentX = 0;
    };

    card.addEventListener('mousedown', onStart);
    card.addEventListener('touchstart', onStart, {passive: true});
    card.addEventListener('mousemove', onMove);
    card.addEventListener('touchmove', onMove, {passive: false});
    card.addEventListener('mouseup', onEnd);
    card.addEventListener('mouseleave', onEnd);
    card.addEventListener('touchend', onEnd);
    card.addEventListener('touchcancel', onEnd);
  });
}

function handleSecondaryCta() {
  showToast('Opening...');
}

function handleCardCta(idx) {
  const s = STORIES[currentStoryKey];
  const card = currentCards[idx];

  if (card.closeOnCta) {
    closeStack();
    return;
  }

  if (card.enrollOnCta && s.enrollKey) {
    state.enrolled[s.enrollKey] = true;
    saveState();
    showEnrollConfirm(s);
    setTimeout(() => {
      hideEnrollConfirm();
      closeStack();
      renderUpcoming();
      renderStories();
    }, 1800);
    return;
  }

  if (idx < totalCards - 1) {
    advance(1);
  } else {
    showToast('Opening ' + card.cta);
    setTimeout(closeStack, 700);
  }
}

function showEnrollConfirm(s) {
  document.getElementById('enrollTitle').textContent = "You're in!";
  document.getElementById('enrollSub').textContent = `${s.label} added to your Upcoming list. We'll send a reminder.`;
  document.getElementById('enrollOverlay').classList.add('active');
  fillConfetti(18);
}

function fillConfetti(count) {
  const cf = document.getElementById('enrollConfetti');
  cf.innerHTML = '';
  const colors = ['#C9924A', '#B68A3C', '#B57894', '#A88641', '#6B7C8E', '#8FA968'];
  for (let i = 0; i < count; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.background = colors[i % colors.length];
    const angle = (i / count) * Math.PI * 2;
    const dist = 85 + Math.random() * 65;
    piece.style.setProperty('--tx', `${Math.cos(angle) * dist - 4}px`);
    piece.style.setProperty('--ty', `${Math.sin(angle) * dist - 7}px`);
    piece.style.setProperty('--rot', `${Math.random() * 720}deg`);
    cf.appendChild(piece);
  }
}

function hideEnrollConfirm() {
  document.getElementById('enrollOverlay').classList.remove('active');
}

let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('visible');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('visible'), 2400);
}

document.addEventListener('keydown', (e) => {
  if (!document.getElementById('cardstackOverlay').classList.contains('active')) return;
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); advance(1); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); advance(-1); }
  if (e.key === 'Escape') closeStack();
});

renderStories();
renderUpcoming();
renderMissed();
</script>
